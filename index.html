<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLA Boar Elite v9.8 (Mobile Optimized)</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #F8FAFC; padding: 20px; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            color: #1E293B; 
        }
        .container { width: 100%; max-width: 1400px; }
        
        .main-header {
            text-align: center; color: #FFFFFF; padding: 25px;
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        
        .search-section { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            display: flex; align-items: center; gap: 15px; margin-bottom: 25px; 
        }
        input { 
            padding: 12px 15px; font-size: 16px; flex: 1; 
            border: 1px solid #CBD5E1; border-radius: 8px; text-transform: uppercase;
            font-weight: bold; text-align: center;
        }
        button { 
            padding: 12px 25px; background: #1E3A8A; color: white; 
            border: none; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s;
        }
        button:hover { background: #1E40AF; transform: translateY(-1px); }
        #status { font-weight: 600; font-size: 14px; color: #64748B; margin-left: auto; }

        #gradeModule { display: none; margin-bottom: 30px; }
        .section-title {
            border-left: 6px solid #1E3A8A; padding-left: 15px;
            color: #1E3A8A; font-weight: 800; font-size: 20px; margin-bottom: 15px;
        }
        
        /* ==========================================================
           電腦端：5 個方塊併排成完整的一行 (5 欄均分)
           ========================================================== */
        .status-grid {
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
            margin-bottom: 20px;
        }
        .status-box {
            background: white; padding: 15px; border-radius: 10px; text-align: center; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #E2E8F0; border-top: 4px solid #3B82F6;
            display: flex; flex-direction: column; justify-content: center; min-height: 70px;
        }
        .status-label { font-size: 11px; color: #64748B; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .status-value { font-size: 18px; color: #1E3A8A; font-weight: 800; }
        
        /* 特殊高亮色調 */
        .strategy-box { background-color: #EFF6FF !important; border-top-color: #10B981 !important; }
        .kpi-box { background-color: #F8FAFC !important; border-top-color: #6366F1 !important; }
        .badge-grade { background-color: #1E3A8A; color: #FFFFFF; padding: 2px 12px; border-radius: 15px; font-weight: bold; }

        #historyModule { display: none; }
        .table-container { 
            background: white; padding: 10px; border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow-x: auto; 
        }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 13px; }
        th { background-color: #F8FAFC; color: #1E3A8A; padding: 12px; border-bottom: 2px solid #E2E8F0; text-align: center; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #F1F5F9; color: #334155; font-family: monospace; }
        tr:hover { background-color: #F8FAFC; }
        .hl-numeric { font-weight: bold; color: #2563EB; }

        .diagnostic-alert {
            background-color: #FEF2F2 !important; border: 2px dashed #EF4444 !important;
            color: #991B1B !important; padding: 15px; border-radius: 8px;
            font-weight: bold; text-align: center; margin-bottom: 20px;
        }

        /* ==========================================================
           手機端 (螢幕寬度 768px 以下)：精確實現「上三、下二」美觀網格
           ========================================================== */
        @media (max-width: 768px) {
            .status-grid {
                grid-template-columns: repeat(6, 1fr); /* 採用 6 等分基底公倍數 */
            }
            /* 前三個方塊 (Tag ID, Breed, Grade) 各佔 2 欄，剛好拼滿第一行 (2x3=6) */
            .box-1, .box-2, .box-3 { grid-column: span 2; }
            /* 後兩個方塊 (Strategy, Average TSO) 各佔 3 欄，剛好拼滿第二行 (3x2=6) */
            .box-4, .box-5 { grid-column: span 3; }
            
            .status-box { padding: 12px 5px; min-height: 60px; }
            .status-value { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <h1>GLA BOAR PERFORMANCE ANALYTICS</h1>
        <p style="opacity: 0.8; font-size: 14px; font-weight: 500;">PhD Standard Swine Breeding Dashboard (Permanently Online)</p>
    </div>

    <div class="search-section">
        <input type="text" id="tagInput" placeholder="SEARCH BOAR ID / CARI ID BOAR (E.G. 1397)" onkeypress="if(event.key==='Enter') doSearch()">
        <button id="searchBtn" onclick="doSearch()">SEARCH</button>
        <div id="status">System Secure & Ready</div>
    </div>

    <div id="diagnosticContainer"></div>

    <div id="gradeModule">
        <div class="section-title">I. BOAR GRADE & STRATEGY</div>
        <div class="status-grid">
            <div class="status-box box-1"><div class="status-label">TAG ID</div><div class="status-value" id="tileId">-</div></div>
            <div class="status-box box-2"><div class="status-label">BREED</div><div class="status-value" id="tileBreed">-</div></div>
            <div class="status-box box-3"><div class="status-label">GRADE</div><div class="status-value"><span class="badge-grade" id="tileGrade">-</span></div></div>
            <div class="status-box box-4 strategy-box"><div class="status-label">MANAGEMENT STRATEGY</div><div class="status-value" id="tileStrategy" style="color: #10B981;">-</div></div>
            <div class="status-box box-5 kpi-box"><div class="status-label">AVERAGE TSO</div><div class="status-value" id="kpiTso" style="color: #6366F1;">-</div></div>
        </div>
    </div>

    <div id="historyModule">
        <div class="section-title">II. RECENT EXTRACTION DATA (TOP 20)</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th><th>Breed</th><th>ID</th><th>Vol(ml)</th><th>Odor</th><th>Color</th><th>Vit</th><th>Conc</th><th>Imp%</th><th>Diluted</th><th>Other Record</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 對接您第 10 版正確運行的後端 GAS 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbzclqTypZTPTfgfOYw-OmyNhGelYUm7iKxDTZLBVP7huzW7t47UUOwbOtQrSf3bGWAy/exec"; 

    function doSearch() {
        const input = document.getElementById('tagInput').value.trim();
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('searchBtn');
        const diagContainer = document.getElementById('diagnosticContainer');

        if(!input) return;
        
        btn.disabled = true;
        statusDiv.style.color = "#EAB308";
        statusDiv.textContent = "Connecting to Data Warehouse...";
        
        document.getElementById('gradeModule').style.display = 'none';
        document.getElementById('historyModule').style.display = 'none';
        diagContainer.innerHTML = ""; 

        fetch(`${API_URL}?tag=${encodeURIComponent(input)}`)
        .then(res => res.json())
        .then(json => {
            btn.disabled = false;
            if (json.error) {
                statusDiv.style.color = "#EF4444";
                statusDiv.textContent = `Error: ${json.error}`;
                return;
            }

            statusDiv.style.color = "#10B981";
            statusDiv.textContent = "Data Successfully Verified.";

            if (!json.gradeData && json.historyData && json.historyData.length > 0) {
                diagContainer.innerHTML = `<div class="diagnostic-alert">⚠️ [DATABASE ALERT] Boar found in Extraction Logs, but BOAR_GRADE_CUMULATIVE sheet has NO data for this ID.</div>`;
            }

            // 渲染看板（包含 TSO）
            if (json.gradeData) {
                document.getElementById('tileId').textContent = json.gradeData.tagId;
                document.getElementById('tileBreed').textContent = json.gradeData.breed;
                document.getElementById('tileGrade').textContent = json.gradeData.grade;
                document.getElementById('tileStrategy').textContent = json.gradeData.strategy;
                document.getElementById('kpiTso').textContent = json.gradeData.avgTso;
                document.getElementById('gradeModule').style.display = 'block';
            }
            
            // 渲染歷史表格
            if (json.historyData && json.historyData.length > 0) {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = json.historyData.map(row => `
                    <tr>
                        <td style="font-weight:800; color:#1E3A8A;">${row[0]}</td>
                        <td>${row[1]}</td>
                        <td style="font-weight:700;">${row[2]}</td>
                        <td class="hl-numeric" style="background:#F0F9FF; font-weight:800;">${row[3]}</td>
                        <td>${row[4]}</td>
                        <td>${row[5]}</td>
                        <td style="font-weight:700; color:#16A34A;">${row[6]}</td>
                        <td>${row[7]}</td>
                        <td style="color:#EF4444;">${row[8]}</td>
                        <td style="background:#F0FDF4; font-weight:800; color:#16A34A;">${row[9]}</td>
                        <td style="text-align:left; color:#64748B;">${row[10] || '-'}</td>
                    </tr>
                `).join('');
                document.getElementById('historyModule').style.display = 'block';
            }
        })
        .catch(err => {
            btn.disabled = false;
            statusDiv.style.color = "#EF4444";
            statusDiv.textContent = "Network Error: Check GAS Deployment Access.";
        });
    }
</script>
</body>
</html>
